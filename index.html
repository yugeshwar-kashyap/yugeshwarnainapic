<html>

  <style>
    @media print { body { display: none; } }
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    .container { max-width: 900px; margin: auto; }
    
    /* Login & UI */
    #loginScreen { margin-top: 80px; background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #00d4ff; display: inline-block; position: relative; }
    .pass-container { position: relative; display: inline-block; }
    input { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 5px; margin: 10px 0; width: 250px; font-size: 16px; }
    .toggle-pass { position: absolute; right: 10px; top: 22px; cursor: pointer; color: #00d4ff; }
    
    #mainContent { display: none; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
    
    /* Card Styling */
    .card { background: #1e1e1e; padding: 10px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
    .card:hover { border-color: #00d4ff; transform: translateY(-5px); }
    .card img { width: 100%; border-radius: 8px; height: 160px; object-fit: cover; cursor: zoom-in; }
    
    /* Full View Modal (Completely Clean) */
    #photoModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; }
    #modalImg { max-width: 100%; max-height: 100%; border: none; box-shadow: none; object-fit: contain; }
    .close-btn { position: absolute; top: 15px; right: 25px; color: white; font-size: 45px; font-weight: bold; cursor: pointer; text-shadow: 0 0 10px #000; z-index: 1001; opacity: 0.7; }
    .close-btn:hover { opacity: 1; }

    .btn { background: #00d4ff; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
    .blocked { color: #ff4d4d; font-weight: bold; padding: 50px; }
  </style>
</head>
  <script src="script.js"></script>

<body oncontextmenu="return false;">

  <div id="photoModal" onclick="closeFullView()">
    <span class="close-btn">&times;</span>
    <img id="modalImg">
  </div>

  <div id="blockMessage" class="blocked" style="display:none;">
    <h1>🚫 ACCESS BLOCKED</h1>
    <p>Too many failed attempts. Try again after 30 minutes.</p>
  </div>

  <div id="loginScreen">
    <h1>🔒 Secure Cloud</h1>
    <div class="pass-container">
      <input type="password" id="passInput" placeholder="Enter Password" onkeydown="if(event.key==='Enter') checkPass()">
      <span class="toggle-pass" onclick="toggleView()">👁️</span>
    </div><br>
    <button class="btn" onclick="checkPass()">Unlock Now</button>
    <p id="attempts" style="font-size: 12px; color: #888;"></p>
  </div>

  <div id="mainContent" class="container">
    <h1 style="color:#00d4ff">📸 Secure Cloud Image</h1>
    <div style="background:#1e1e1e; padding:15px; border-radius:10px; border:1px solid #333;">
      <input type="file" id="fileInput" style="width: auto;"> <br>
      <button class="btn" onclick="startUpload()">Upload Photo</button>
      <p id="status"></p>
    </div>
    <div class="gallery" id="gallery"></div>
  </div>

  <script>
    const PASSWORDS = { LOGIN: "yugeshwarnaina143", DOWN: "naina", ADMIN: "yugeshwar@2008" };

    function toggleView() {
      const p = document.getElementById("passInput");
      p.type = (p.type === "password") ? "text" : "password";
    }

    // Modal Functions (Clean version)
    function openFullView(src) {
      document.getElementById("photoModal").style.display = "flex";
      document.getElementById("modalImg").src = src;
    }

    function closeFullView() {
      document.getElementById("photoModal").style.display = "none";
      document.getElementById("modalImg").src = "";
    }

    // Access Control
    let attempts = localStorage.getItem('login_attempts') || 0;
    let blockTime = localStorage.getItem('block_until') || 0;

    function checkPass() {
      const now = new Date().getTime();
      if (now < blockTime) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('blockMessage').style.display = 'block';
        return;
      }
      const input = document.getElementById('passInput').value;
      if (input === PASSWORDS.LOGIN) {
        localStorage.setItem('login_attempts', 0);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        loadMedia();
      } else {
        attempts++;
        localStorage.setItem('login_attempts', attempts);
        document.getElementById('attempts').innerText = `Attempts: ${attempts}/5`;
        if (attempts >= 5) {
          localStorage.setItem('block_until', new Date().getTime() + (30 * 60 * 1000));
          location.reload();
        } else { alert("Incorrect Password!"); }
      }
    }

    function loadMedia() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = "🌀 Opening gallery...";
      google.script.run.withSuccessHandler((media) => {
        gallery.innerHTML = "";
        media.forEach(item => {
          const div = document.createElement('div');
          div.className = "card";
          div.innerHTML = `
            <img src="${item.url}" onclick="openFullView('${item.url}')">
            <div style="margin-top:5px;">
              <button class="btn" style="padding:5px 10px;" onclick="secureAction('${item.downloadUrl}', 'DOWN')">⬇️</button>
              <button class="btn" style="background:#ff4d4d; padding:5px 10px;" onclick="secureAction('${item.id}', 'ADMIN')">🗑️</button>
            </div>
          `;
          gallery.appendChild(div);
        });
      }).getMedia();
    }

    function secureAction(id, type) {
      const p = prompt(`Enter ${type} Password:`);
      if (p === PASSWORDS[type]) {
        if (type === 'DOWN') window.open(id);
        if (type === 'ADMIN') {
          google.script.run.withSuccessHandler(() => { alert("Deleted!"); loadMedia(); }).deleteFile(id);
        }
      } else { alert("Unauthorized!"); }
    }

    function startUpload() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert("Select a file first!");
      document.getElementById('status').innerText = "🚀 Uploading...";
      const reader = new FileReader();
      reader.onload = (e) => {
        google.script.run.withSuccessHandler(() => { 
          document.getElementById('status').innerText = "✅ Done!";
          loadMedia(); 
        }).uploadFile(e.target.result, file.name);
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
